:root{
  --grass-700:#166534;
  --grass-600:#16a34a;
  --grass-100:#dcfce7;
  --gold-500:#ca8a04;
  --ink-900:#111827;
  --ink-500:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#fff;
  font-family:"DM Sans",system-ui,-apple-system,sans-serif;
  color:var(--ink-900);
  min-height:100vh;
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:transparent;
  z-index:0;
}
#root{position:relative;z-index:1;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:999px;}
.inp:focus{border-color:var(--grass-600)!important;box-shadow:0 0 0 3px rgba(22,163,74,.12);outline:none;}
.score-inp:focus{border-color:var(--grass-600)!important;box-shadow:0 0 0 3px rgba(22,163,74,.14);outline:none;}
.btn-acc{transition:transform .12s ease,box-shadow .2s ease,filter .2s ease;}
.btn-acc:hover{filter:brightness(.98);box-shadow:0 6px 16px rgba(22,163,74,.22);}
.btn-acc:active{transform:translateY(1px);}
.pill{transition:all .18s;cursor:pointer;}
summary{list-style:none;}
summary::-webkit-details-marker{display:none;}
summary:hover{filter:brightness(.995);}
.match-card{
  border:1px solid rgba(17,24,39,.08)!important;
  animation:cardIn .32s ease both;
  position:relative;
  isolation:isolate;
  background:
    radial-gradient(260px 120px at 50% -30%,rgba(22,163,74,.12),transparent 72%),
    linear-gradient(180deg,rgba(255,255,255,.98),rgba(255,255,255,.94))!important;
}
.match-card:before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(90deg,transparent 0 48%,rgba(22,163,74,.08) 48% 52%,transparent 52%),
    radial-gradient(circle at 50% 50%,transparent 0 46px,rgba(22,163,74,.08) 47px 48px,transparent 49px);
  opacity:.5;
  z-index:0;
}
.match-card>*{position:relative;z-index:1;}
.match-card:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(17,24,39,.12)!important;}
select{cursor:pointer;}
.login-grid{grid-template-columns:minmax(0,1.05fr) minmax(320px,.95fr);}
.login-hero{min-height:480px;}
.login-hero,.home-hero,.join-hero{
  isolation:isolate;
}
.login-hero:after,.home-hero:after,.join-hero:after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(115deg,rgba(255,255,255,.12),rgba(255,255,255,0) 38%),
    radial-gradient(circle at 74% 22%,rgba(255,255,255,.16),rgba(255,255,255,0) 28%),
    linear-gradient(90deg,transparent 0 49.4%,rgba(255,255,255,.10) 49.4% 50.6%,transparent 50.6%);
  opacity:.8;
  z-index:0;
}
.login-hero>*,.home-hero>*,.join-hero>*{position:relative;z-index:1;}
.login-score-grid,.info-grid{grid-template-columns:repeat(3,1fr);}
.join-grid{grid-template-columns:minmax(0,.9fr) minmax(300px,1fr);}
.lux-card{
  position:relative;
  isolation:isolate;
  overflow:hidden;
  box-shadow:0 12px 34px rgba(17,24,39,.08),0 1px 2px rgba(17,24,39,.04)!important;
}
.lux-card:before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(240px 120px at 14% -20%,rgba(22,163,74,.12),transparent 70%),
    radial-gradient(260px 150px at 110% 20%,rgba(234,179,8,.12),transparent 64%),
    linear-gradient(180deg,rgba(255,255,255,.65),rgba(255,255,255,0));
  z-index:0;
}
.lux-card>*{position:relative;z-index:1;}
.topbar-premium{
  background:#fff!important;
  border-bottom:1px solid rgba(17,24,39,.08)!important;
  box-shadow:none!important;
}
.topbar-premium:before{
  display:none;
}
.bottom-nav-premium{display:none!important;}
.bottom-nav-premium button{
  transition:transform .18s ease,color .18s ease,background .18s ease;
}
.bottom-nav-premium button:hover{
  background:rgba(22,163,74,.045)!important;
  transform:translateY(-1px);
}
.btn-acc,.pill,summary,button{
  -webkit-tap-highlight-color:transparent;
}
.mini-tile{
  position:relative;
  overflow:hidden;
}
.mini-tile:after{
  content:"";
  position:absolute;
  inset:auto -18px -24px auto;
  width:52px;
  height:52px;
  border-radius:50%;
  background:rgba(255,255,255,.35);
}
.brand-chip{
  box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 8px 22px rgba(0,0,0,.10);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
@media (max-width:820px){
  .login-grid,.join-grid{grid-template-columns:1fr!important;}
  .login-hero{min-height:auto!important;}
}
@media (max-width:620px){
  .login-score-grid,.info-grid{grid-template-columns:1fr!important;}
}
@media (max-width:480px){
  .match-card{animation:none;}
}
</style>

function calcPts(pred,result){
  if(!result||result.home===''||result.away==='') return null;
  const ph=+pred.home,pa=+pred.away,rh=+result.home,ra=+result.away;
  if(isNaN(ph)||isNaN(pa)) return null;
  const predOutcome=ph>pa?'H':ph<pa?'A':'D';
  const realOutcome=rh>ra?'H':rh<ra?'A':'D';
  const oneScore=ph===rh||pa===ra;
  if(ph===rh&&pa===ra) return 7;
  if(predOutcome===realOutcome&&oneScore) return 4;
  if(predOutcome===realOutcome) return 3;
  if(oneScore) return 1;
  return 0;
}
const fDate=dt=>new Date(dt).toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
const fTime=dt=>new Date(dt).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo'});
const dayKeySP=dt=>new Intl.DateTimeFormat('pt-BR',{timeZone:'America/Sao_Paulo',day:'2-digit',month:'2-digit',year:'numeric'}).format(new Date(dt));
const started=dt=>new Date(dt).getTime()<=Date.now();
const isToday=dt=>dayKeySP(dt)===dayKeySP(new Date());
const isUpcoming=dt=>{const h=(new Date(dt).getTime()-Date.now())/3600000;return h>0&&h<=24;};
const timeUntilShort=dt=>{
  const mins=Math.max(0,Math.round((new Date(dt).getTime()-Date.now())/60000));
  if(mins<60) return `${mins}min`;
  const hours=Math.round(mins/60);
  if(hours<48) return `${hours}h`;
  return `${Math.round(hours/24)}d`;
};
const normalizeName=value=>value.trim().replace(/\s+/g,' ');
const isValidName=name=>name.length>=2&&name.length<=24&&!/[.#$\[\]/]/.test(name);
const parseScore=value=>{
  const n=Number(value);
  if(!Number.isInteger(n)||n<0||n>20) return null;
  return n;
};
const parseCsvLine=(line,delimiter=',')=>{
  const out=[];
  let cur='';
  let inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){
      if(inQuotes&&line[i+1]==='"'){cur+='"';i++;}
      else inQuotes=!inQuotes;
      continue;
    }
    if(ch===delimiter&&!inQuotes){out.push(cur.trim());cur='';continue;}
    cur+=ch;
  }
  out.push(cur.trim());
  return out;
};

function Bolao(){
  const [me,setMe]=useState(''); // auth uid

  const [pi,setPi]=useState({});        // local prediction inputs
  const [ri,setRi]=useState({});        // local result inputs (admin)
  const [champInput,setChampInput]=useState('');
  const [podiumInput,setPodiumInput]=useState(emptyPodium());
  const [bracketInput,setBracketInput]=useState(emptyBracket());
  const [adminChampInput,setAdminChampInput]=useState('');
  const [officialPodiumInput,setOfficialPodiumInput]=useState(emptyPodium());
  const [officialBracketInput,setOfficialBracketInput]=useState(emptyBracket());
  const [onlyMissing,setOnlyMissing]=useState(false);
  const [matchView,setMatchView]=useState('groups');
  const [generalView,setGeneralView]=useState('groups');
  const [reminderEnabled,setReminderEnabled]=useState(localStorage.getItem(REMINDER_STORAGE_KEY)==='1');
  const [lastReminderMatch,setLastReminderMatch]=useState('');
  const [csvImporting,setCsvImporting]=useState(false);
  const [saving,setSaving]=useState(null);
  const [toast,setToast]=useState({msg:'',ok:true});
  const [boot,setBoot]=useState(false);
  const [newM,setNewM]=useState({home:'',away:'',ph:'Grupos',gr:'A',dt:'',venue:''});
  const isAdmin = !!(me && adminIds[me]);
  const firstMatch = matches[0] || BASE_MATCHES[0] || null;
  const champLockDt = firstMatch?.dt || '';
  const champLocked = champLockDt ? started(champLockDt) : false;
  const champLockLabel = champLockDt ? `${fDate(champLockDt)} às ${fTime(champLockDt)}` : 'início do primeiro jogo';
  const dayFirstKickoffMs=m=>{
    const source=(matches&&matches.length?matches:BASE_MATCHES).filter(x=>dayKeySP(x.dt)===dayKeySP(m.dt));
    const first=Math.min(...source.map(x=>new Date(x.dt).getTime()));
    return Number.isFinite(first)?first:new Date(m.dt).getTime();
  };
  const unlockAt=m=>dayFirstKickoffMs(m)-PREDICTION_OPEN_MS;
  const predictionOpen=m=>Date.now()>=unlockAt(m);
  const unlockLabel=m=>`${new Date(unlockAt(m)).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',timeZone:'America/Sao_Paulo'})} às ${new Date(unlockAt(m)).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo'})}`;
  const matchLocked=m=>started(m?.dt);
  const canEditMatch=m=>m&&predictionOpen(m)&&!matchLocked(m);
  const normalizeBracket=obj=>BRACKET_PHASES.reduce((acc,phase)=>{
    const arr=Array.isArray(obj?.[phase.key])?obj[phase.key]:[];
    acc[phase.key]=Array.from({length:phase.count},(_,i)=>arr[i]||'');
    return acc;
  },{});
  const normalizePodium=obj=>({...emptyPodium(),...(obj||{})});

  const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast({msg:'',ok:true}),2600);};
  const getName = uid => partMeta[uid]?.name || 'Sem nome';
  const meReady = !!me && !!partMeta[me]?.name;

  // ── Auth listener ───────────────────────────────────────────────────────────
  useEffect(()=>{
    const savedName = localStorage.getItem(NAME_STORAGE_KEY) || '';
    const authUnsub = auth.onAuthStateChanged(user=>{
      if(user){
        const fallbackName = normalizeName(savedName || user.displayName || (user.email?user.email.split('@')[0]:''));
        setMe(user.uid);
        setMeEmail(user.email || '');
        const quickName=fallbackName.slice(0,24);
        setNameInput(quickName);
        if(quickName){
          setMeName(quickName);
          setPartMeta(prev=>({...prev,[user.uid]:{name:quickName,email:user.email||''}}));
          setParts(prev=>prev.includes(user.uid)?prev:[...prev,user.uid]);
        }
        setBoot(false);
      }else{
        setMe('');
        setMeName('');
        setMeEmail('');
        setMatches(BASE_MATCHES);
        setPreds({});
        setParts([]);
        setPartMeta({});
        setAdminIds({});
        setChampPreds({});
        setChampWinner('');
        setPodiumPreds({});
        setBracketPreds({});
        setOfficialPodium(emptyPodium());
        setOfficialBracket(emptyBracket());
        setAudit([]);
        setBoot(false);
      }
      setAuthReady(true);
    });
    return ()=>{authUnsub && authUnsub();};
  },[]);

  // ── Database listeners (only after auth) ───────────────────────────────────
  useEffect(()=>{
    if(!authReady||!me) return;
    let live=true;

    const onReadError=(err,path)=>{
      if(!live) return;
      console.error('Firebase read error:', path, err && (err.code||err.message||err));
      showToast('Erro de leitura no Firebase. Verifique login e regras.',false);
      setBoot(false);
    };


    const matchesRef = ref('matches');
    const myPredsRef = ref('predictions/'+me);
    const partsRef = ref('participants');
    const adminsRef = ref('admins');

    const matchesUnsub = matchesRef.on('value', snap=>{
      if(!live) return;
      const val=snap.val()||{};
      const source=Object.keys(val).length?Object.values(val):BASE_MATCHES;
      const arr=source.sort((a,b)=>new Date(a.dt)-new Date(b.dt));
      setMatches(arr);
      const riInit={};
      arr.forEach(m=>{riInit[m.id]=m.result||{home:'',away:''};});
      setRi(riInit);
      setBoot(false);
    }, err=>onReadError(err,'matches.on'));

    const myPredsUnsub = myPredsRef.on('value', snap=>{
      if(!live) return;
      const mine=snap.val()||{};
      setPreds(prev=>({...prev,[me]:mine}));
    }, err=>onReadError(err,'predictions.me.on'));

    const partsUnsub = partsRef.on('value', snap=>{
      if(!live) return;
      const val=snap.val()||{};
      const ids=[];
      const meta={};
      Object.entries(val).forEach(([uid,item])=>{
        if(!item||typeof item!=='object') return;
        const parsedName=normalizeName((item.name||'').toString()).slice(0,24);
        if(!isValidName(parsedName)) return;
        ids.push(uid);
        meta[uid]={name:parsedName,email:item.email||''};
      });
      setParts(ids);
      setPartMeta(meta);
    }, err=>onReadError(err,'participants.on'));

    const adminsUnsub = adminsRef.on('value', snap=>{
      if(!live) return;
      setAdminIds(snap.val()||{});
    }, err=>onReadError(err,'admins.on'));


    return ()=>{
      live=false;
      matchesRef.off('value', matchesUnsub);
      myPredsRef.off('value', myPredsUnsub);
      partsRef.off('value', partsUnsub);
      adminsRef.off('value', adminsUnsub);
    };
  },[authReady, me]);

  useEffect(()=>{
    if(!authReady||!me) return;
    if(tab!=='ranking'&&tab!=='admin') return;
    let live=true;
    const allPredsRef = ref('predictions');
    const allPredsUnsub = allPredsRef.on('value', snap=>{
      if(!live) return;
      setPreds(snap.val()||{});
    }, err=>{
      if(!live) return;
      console.error('Firebase read error:', 'predictions.all.on', err && (err.code||err.message||err));
      showToast('Erro ao carregar ranking. Verifique login e regras.',false);
    });
    return ()=>{
      live=false;
      allPredsRef.off('value', allPredsUnsub);
    };
  },[authReady, me, tab]);

  useEffect(()=>{
    if(!authReady||!me||!isAdmin){
      setAudit([]);
      return;
    }
    let live=true;
    const auditQuery = ref('audit').limitToLast(30);
    const auditUnsub = auditQuery.on('value', snap=>{
      if(!live) return;
      const val=snap.val()||{};
      const arr=Object.entries(val).map(([id,item])=>({id,...item})).sort((a,b)=>(b.ts||0)-(a.ts||0));
      setAudit(arr);
    }, err=>console.error('Firebase audit read error:', err && (err.code||err.message||err)));
    return ()=>{
      live=false;
      auditQuery.off('value', auditUnsub);
    };
  },[authReady, me, isAdmin]);

  useEffect(()=>{
    if(!authReady||!me||!isAdmin) return;
    ref('matches').once('value').then(snap=>{
      if(!snap.val()){
        const obj={};
        BASE_MATCHES.forEach(m=>{obj[m.id]=m;});
        ref('matches').set(obj).catch(()=>{});
      }
    }).catch(err=>console.error('Firebase seed matches error:', err && (err.code||err.message||err)));
  },[authReady, me, isAdmin]);

  // Populate local inputs when user or preds/matches change
  useEffect(()=>{
    if(!me||matches.length===0) return;
    const piInit={};
    matches.forEach(m=>{piInit[m.id]=(preds[me]||{})[m.id]||{home:'',away:''};});
    setPi(piInit);
  },[me, matches, preds[me]]);

  useEffect(()=>{
    if(me&&partMeta[me]?.name){
      setMeName(partMeta[me].name);
      if(!nameInput) setNameInput(partMeta[me].name);
    }
  },[me, partMeta]);

  useEffect(()=>{
    localStorage.setItem(REMINDER_STORAGE_KEY, reminderEnabled?'1':'0');
  },[reminderEnabled]);

  // ── Actions ─────────────────────────────────────────────────────────────────
  const join=async()=>{
    if(!me){showToast('Faça login com Google primeiro.',false);return;}
    const raw=normalizeName(nameInput);
    if(!isValidName(raw)){
      showToast('Nome inválido (2-24 chars, sem . # $ [ ] /)',false);
      return;
    }
    try{
      localStorage.setItem(NAME_STORAGE_KEY, raw);
      await ref('participants/'+me).update({
        name:raw,
        email:meEmail||'',
        updatedAt:firebase.database.ServerValue.TIMESTAMP,
      });
      const legacyId = parts.find(id=>id!==me&&getName(id).localeCompare(raw,'pt-BR',{sensitivity:'base'})===0);
      if(legacyId){
        if(!preds[me]&&preds[legacyId]) await ref('predictions/'+me).set(preds[legacyId]);
      }
      setMeName(raw);
      setPartMeta(prev=>({...prev,[me]:{name:raw,email:meEmail||''}}));
      setParts(prev=>prev.includes(me)?prev:[...prev,me]);
      showToast('Perfil salvo!');
    }catch{
      showToast('Erro ao salvar perfil.',false);
    }
    const piInit={};
    matches.forEach(m=>{piInit[m.id]=(preds[me]||{})[m.id]||{home:'',away:''};});
    setPi(piInit);
  };

  const signInGoogle=async()=>{
    try{
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.addScope('profile');
      provider.addScope('email');
      await auth.signInWithPopup(provider);
    }catch{
      showToast('Falha no login Google. Verifique se o provedor está habilitado no Firebase Auth.',false);
    }
  };

  const claimFirstAdmin=async()=>{
    if(!me){showToast('Faça login primeiro.',false);return;}
    if(Object.keys(adminIds).length>0){showToast('Admins já foram definidos.',false);return;}
    try{
      await ref('admins/'+me).set(true);
      showToast('Você agora é admin deste bolão.');
    }catch{
      showToast('Erro ao definir admin.',false);
    }
  };

  const logAdminAction=(action,detail={})=>{
    if(!me) return Promise.resolve();
    return ref('audit').push({
      uid:me,
      name:meName||getName(me),
      action,
      detail,
      ts:firebase.database.ServerValue.TIMESTAMP,

    localStorage.removeItem(NAME_STORAGE_KEY);

      await auth.signOut();

      showToast('Erro ao sair.',false);

  const savePred=async(id)=>{

    if(!predictionOpen(m)){showToast('Palpite libera em '+unlockLabel(m)+'.',false);return;}
    if(matchLocked(m)){showToast('Palpite fechado para este jogo.',false);return;}
    const p=pi[id]||{home:'',away:''};
    const home=parseScore(p.home),away=parseScore(p.away);
    if(home===null||away===null){showToast('Placar inválido (0 a 20).',false);return;}
    setSaving(id);
    try{
      await ref(`predictions/${me}/${id}`).set({home,away});
      showToast('Palpite salvo!');
    }catch{
      showToast('Erro ao salvar palpite.',false);
    }finally{
      setSaving(null);
    }
  };

    const openMatches=groupMatches.filter(m=>canEditMatch(m));
    if(openMatches.length===0){showToast('Nenhum jogo deste grupo está liberado agora.',false);return;}
    const updates={};
    for(const m of openMatches){

  const savePodium=async()=>{
    if(champLocked){showToast('Pódio bloqueado após o início da Copa.',false);return;}
    const data=normalizePodium(podiumInput);
    if(!data.champ||!data.vice||!data.third){showToast('Preencha campeão, vice e 3º lugar.',false);return;}
    if(new Set([data.champ,data.vice,data.third]).size<3){showToast('Pódio precisa ter três seleções diferentes.',false);return;}
    setSaving('podium');
    try{
      await ref('podiumPreds/'+me).set(data);

  const saveBracket=async()=>{
    if(champLocked){showToast('Chaveamento bloqueado após o início da Copa.',false);return;}
    const data=normalizeBracket(bracketInput);
    const incomplete=BRACKET_PHASES.find(phase=>data[phase.key].filter(Boolean).length<phase.count);
    if(incomplete){showToast(`Preencha todos os classificados: ${incomplete.label}.`,false);return;}
    setSaving('bracket');
    try{
      await ref('bracketPreds/'+me).set(data);
      showToast('Chaveamento salvo!');
    }catch{
      showToast('Erro ao salvar chaveamento.',false);
    }finally{
      setSaving(null);

  const saveResult=async(id)=>{
    if(!isAdmin){showToast('Ação permitida só para admin.',false);return;}
    const res=ri[id]||{home:'',away:''};
    const home=parseScore(res.home),away=parseScore(res.away);

    if(lines.length<2){showToast('CSV vazio ou incompleto.',false);return;}
    const delimiter=lines[0].includes(';')?';':',';
    const header=parseCsvLine(lines[0],delimiter).map(h=>h.toLowerCase());
    const idx=(...keys)=>header.findIndex(h=>keys.includes(h));
    const iId=idx('id');
    const iHome=idx('home','casa','time_casa');
    const iAway=idx('away','fora','time_fora');
    const iDt=idx('dt','data','datetime','datahora');
    const iPh=idx('ph','fase');
    const iGr=idx('gr','grupo');
    const iVenue=idx('venue','sede','estadio');

      showToast('CSV precisa das colunas: home, away, dt.',false);

    }
    const updates={};

    lines.slice(1).forEach((line,rowIx)=>{

      if(!home||!away||!dtRaw) return;
      const dtObj=new Date(dtRaw.includes('T')?dtRaw:dtRaw.replace(' ','T'));

      const ph=(cols[iPh]||'Grupos').trim()||'Grupos';

      const venue=(cols[iVenue]||'').trim();
      updates[id]={id,home,away,dt:dtObj.toISOString(),ph,gr,venue};
      okCount++;
    });

            <thead>
              <tr style={{background:'#00732E',color:'#fff'}}>
                <th style={{padding:'12px',fontSize:12,textAlign:'left'}}>#</th>
                <th style={{padding:'12px',fontSize:12,textAlign:'left'}}>Participante</th>
                <th style={{padding:'12px 8px',fontSize:12,textAlign:'center'}}>Placar exato</th>
                <th style={{padding:'12px 8px',fontSize:12,textAlign:'center'}}>Vencedor</th>
                <th style={{padding:'12px 8px',fontSize:12,textAlign:'center'}}>Jogos</th>
                <th style={{padding:'12px 8px',fontSize:12,textAlign:'center'}}>Grupos</th>
                <th style={{padding:'12px 8px',fontSize:12,textAlign:'center'}}>Elim.</th>
                <th style={{padding:'12px',fontSize:12,textAlign:'right'}}>Total</th>
              </tr>
            </thead>
            <tbody>
              {board.map((p,i)=><tr key={p.uid} style={{background:p.uid===me?'#F0FDF4':i===0?'#FFFBEB':'#fff',borderBottom:'1px solid '+T.border}}>
                <td style={{padding:'12px',fontSize:13,fontWeight:900,color:i<3?T.gold:T.txt3}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
                <td style={{padding:'12px'}}>
                  <div style={{fontSize:14,fontWeight:900,color:p.uid===me?T.accent:T.txt1}}>{p.name}{p.uid===me&&<span style={{fontSize:11,color:T.txt3,fontWeight:500}}> · você</span>}</div>
                  <div style={{fontSize:10,color:T.txt3,marginTop:2}}>{p.total} palpites pontuados · {p.miss} erros</div>
                </td>
                <td style={{padding:'12px 8px',textAlign:'center',fontWeight:900,color:T.ok}}>{p.exact}</td>
                <td style={{padding:'12px 8px',textAlign:'center',fontWeight:900,color:T.half}}>{p.win}</td>
                <td style={{padding:'12px 8px',textAlign:'center',fontWeight:900}}>{p.gamePts}</td>
                <td style={{padding:'12px 8px',textAlign:'center',fontWeight:900}}>{p.groupPts}</td>
                <td style={{padding:'12px 8px',textAlign:'center',fontWeight:900}}>{p.elimPts}</td>
                <td style={{padding:'12px',textAlign:'right',fontSize:22,fontWeight:950,color:T.txt1}}>{p.pts}</td>
              </tr>)}
            </tbody>
          </table>
        </div>
        {board.length===0&&<div style={{padding:'28px',fontSize:13,color:T.txt3,textAlign:'center'}}>Nenhum participante com palpite ainda.</div>}
      </div>
      <SectionTitle title="Ranking por dia" text="Recortes diários aparecem quando houver jogo com resultado lançado."/>
      {dailyBoards.length>0?dailyBoards.map(group=><details key={group.key} style={{marginBottom:10}}><summary style={{listStyle:'none',cursor:'pointer',background:T.card,border:'1px solid '+T.border,borderRadius:14,padding:'13px 15px',boxShadow:shadow,display:'flex',alignItems:'center',gap:12}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:950,color:T.txt1,textTransform:'capitalize'}}>{group.label}</div><div style={{fontSize:11,color:T.txt3,marginTop:2}}>{group.matches.length} jogo{group.matches.length!==1?'s':''} com resultado</div></div><span style={{fontSize:16,color:T.txt3}}>⌄</span></summary><div style={{background:T.card,border:'1px solid '+T.border,borderTop:'none',borderRadius:'0 0 14px 14px',overflow:'hidden'}}>{group.board.slice(0,8).map((p,i)=><div key={p.uid} style={{display:'flex',alignItems:'center',gap:10,padding:'11px 14px',borderTop:i?'1px solid '+T.border:'none',background:p.uid===me?T.accentLt:'#fff'}}><span style={{width:28,fontSize:13,fontWeight:950,color:i<3?T.gold:T.txt3}}>{i+1}</span><span style={{flex:1,fontSize:13,fontWeight:900,color:p.uid===me?T.accent:T.txt1}}>{p.name}{p.uid===me&&<span style={{fontSize:10,color:T.txt3,fontWeight:600}}> · você</span>}</span><span style={{fontSize:11,color:T.txt3}}>🎯 {p.exact}</span><strong style={{fontSize:16,color:T.txt1}}>{p.pts} pts</strong></div>)}</div></details>):<div className="lux-card" style={{background:T.card,border:'1px solid '+T.border,borderRadius:18,padding:'24px',boxShadow:shadow,textAlign:'center',color:T.txt2,fontSize:13}}>O ranking diário aparece assim que algum resultado for registrado.</div>}
      <div style={{fontSize:11,color:T.txt3,lineHeight:1.6}}>Desempate: total de pontos → pontos em jogos → placares exatos → vencedores acertados → menos erros → ordem alfabética.</div><div style={{height:88}}/>
    </div>
  );

  const RuleCard=({icon,title,children})=>(
    <div style={{background:'#fff',border:'1px solid '+T.border,borderRadius:12,padding:'16px',boxShadow:'0 1px 2px rgba(15,23,42,.04)'}}>
      <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
        <div style={{width:38,height:38,borderRadius:10,background:T.accentLt,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{icon}</div>
        <div>
          <h3 style={{fontSize:15,fontWeight:950,color:T.txt1,marginBottom:6}}>{title}</h3>
          <div style={{fontSize:13,color:T.txt2,lineHeight:1.6}}>{children}</div>
        </div>
      </div>
    </div>
  );

  const renderTabRules=()=>(
    <div style={{padding:'28px 14px 72px',maxWidth:1120,margin:'0 auto'}}>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:13,color:T.txt3,marginBottom:8}}>Regulamento</div>
        <h1 style={{fontSize:30,lineHeight:1.1,color:T.txt1,letterSpacing:-.8,marginBottom:8}}>Como funciona o bolão</h1>
        <p style={{fontSize:15,color:T.txt2,lineHeight:1.65,maxWidth:820}}>O bolão agora é focado em placares: você palpita jogo a jogo, por dia da Copa, e soma pontos conforme os resultados reais forem lançados.</p>
      </div>

      <div className="info-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:22}}>
        <StatTile value="48h" label="abre antes" color="#1D4ED8" bg="#DBEAFE"/>
        <StatTile value="7" label="placar exato" color={T.ok} bg={T.okBg}/>
        <StatTile value="4" label="vencedor + gol" color={T.half} bg={T.halfBg}/>
        <StatTile value="3" label="vencedor/empate" color={T.accent} bg={T.accentLt}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:14,marginBottom:18}}>
        <RuleCard icon="⏱" title="Quando os palpites liberam">
          <p>Cada dia de Copa fica bloqueado até <strong>48 horas antes do primeiro jogo daquele dia</strong>.</p>
          <p>Quando a janela do dia abre, você pode salvar ou atualizar os placares daquele dia até cada jogo começar.</p>
          <p>Depois do início do jogo, o palpite fecha automaticamente e não pode mais ser alterado.</p>
        </RuleCard>
        <RuleCard icon="📅" title="Fase de grupos por dia">
          <p>A fase de grupos aparece organizada por <strong>dia de jogo</strong>, para ficar mais fácil acompanhar o que precisa ser preenchido.</p>
          <p>Use o filtro <strong>Só faltando</strong> para ver apenas partidas sem palpite.</p>
          <p>Mesmo jogos futuros aparecem na lista, mas só liberam quando a janela daquele dia abrir.</p>
        </RuleCard>
        <RuleCard icon="⚡" title="Eliminatórias">
          <p>As eliminatórias continuam no bolão como <strong>palpites de placar</strong>.</p>
          <p>Quando os confrontos forem cadastrados pelo admin, eles entram na aba Eliminatórias.</p>
          <p>A mesma regra vale: o dia abre 48 horas antes do primeiro jogo, e cada partida fecha no próprio horário de início.</p>
        </RuleCard>
        <RuleCard icon="⚽" title="Pontuação dos jogos">
          <p><strong>7 pontos</strong> se acertar o placar exato.</p>
          <p><strong>4 pontos</strong> se acertar vencedor ou empate e também acertar os gols de um dos times.</p>
          <p><strong>3 pontos</strong> se acertar apenas o vencedor ou o empate.</p>
          <p><strong>1 ponto</strong> se errar o resultado, mas acertar os gols de um dos times.</p>
          <p><strong>0 pontos</strong> se não acertar nenhum critério.</p>
        </RuleCard>
        <RuleCard icon="👀" title="Sem spoiler antes da hora">
          <p>Cada pessoa preenche os próprios palpites individualmente.</p>
          <p>O ideal é revelar comparativos só depois que o jogo começar ou quando houver resultado lançado.</p>
          <p>Isso evita cópia de palpite e mantém o bolão justo.</p>
        </RuleCard>
        <RuleCard icon="🥇" title="Ranking e desempate">
          <p>O ranking soma apenas pontos dos jogos cadastrados e com resultado oficial lançado.</p>
          <p>Em caso de empate, a ordem é: total de pontos, pontos em jogos, placares exatos, vencedores acertados, menos erros e ordem alfabética.</p>
          <p>Não há pódio, campeão antecipado ou chaveamento nesta versão.</p>
        </RuleCard>
      </div>
      <div style={{height:88}}/>
    </div>
  );

  const renderTabAdmin=()=>!isAdmin?null:(
    <div style={{padding:'28px 14px 72px',maxWidth:1120,margin:'0 auto'}}>
      <div style={{marginBottom:22}}>
        <div style={{fontSize:13,color:T.txt3,marginBottom:8}}>Painel Admin</div>
        <h1 style={{fontSize:30,lineHeight:1.1,color:T.txt1,letterSpacing:-.8,marginBottom:8}}>Controle do bolão</h1>
        <p style={{fontSize:15,color:T.txt2,lineHeight:1.6,maxWidth:760}}>Use este painel para lançar resultados, cadastrar jogos das eliminatórias e acompanhar participantes reais.</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'minmax(0,1.15fr) minmax(280px,.85fr)',gap:14,alignItems:'start'}}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div className="lux-card" style={{background:T.card,border:'1px solid '+T.border,borderRadius:18,padding:'18px',boxShadow:shadow}}>
            <SectionTitle title="Registrar resultados" text="Resultados liberam pontos de placar no ranking."/>
            <div style={{maxHeight:560,overflow:'auto',paddingRight:4}}>{matches.map(m=><div key={m.id} style={{display:'flex',alignItems:'center',padding:'9px 0',borderBottom:'1px solid '+T.border,flexWrap:'wrap',gap:8}}><span style={{fontSize:12,color:T.txt2,flex:1,minWidth:220}}><span style={{color:T.accent,fontWeight:900,marginRight:6}}>{m.ph==='Grupos'?'Grupo '+m.gr:m.ph}</span>{m.home} × {m.away}<span style={{color:T.txt3,marginLeft:6}}>{fDate(m.dt)}</span></span><div style={{display:'flex',alignItems:'center',gap:6}}><input style={{width:42,padding:'6px',textAlign:'center',borderRadius:8,border:'1.5px solid '+T.border,background:T.bg,color:T.txt1,fontSize:15,fontWeight:900,outline:'none'}} type="number" min="0" max="20" value={ri[m.id]?.home||''} onChange={e=>setRi(r=>({...r,[m.id]:{...r[m.id],home:e.target.value}}))}/><span style={{color:T.txt3,fontWeight:900}}>-</span><input style={{width:42,padding:'6px',textAlign:'center',borderRadius:8,border:'1.5px solid '+T.border,background:T.bg,color:T.txt1,fontSize:15,fontWeight:900,outline:'none'}} type="number" min="0" max="20" value={ri[m.id]?.away||''} onChange={e=>setRi(r=>({...r,[m.id]:{...r[m.id],away:e.target.value}}))}/><button className="btn-acc" style={{...btnAcc,padding:'6px 11px',fontSize:11}} onClick={()=>saveResult(m.id)}>OK</button></div></div>)}</div>
          </div>
          <div className="lux-card" style={{background:T.card,border:'1px solid '+T.border,borderRadius:18,padding:'18px',boxShadow:shadow}}>
            <SectionTitle title="Adicionar partida" text="Use principalmente para cadastrar jogos das eliminatórias quando os confrontos saírem."/>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:8,marginBottom:8}}><input className="inp" style={inpSt} placeholder="Time casa" value={newM.home} onChange={e=>setNewM(m=>({...m,home:e.target.value}))}/><input className="inp" style={inpSt} placeholder="Time fora" value={newM.away} onChange={e=>setNewM(m=>({...m,away:e.target.value}))}/><select className="inp" style={inpSt} value={newM.ph} onChange={e=>setNewM(m=>({...m,ph:e.target.value,gr:e.target.value==='Grupos'?m.gr:''}))}><option>Grupos</option><option>32 avos</option><option>16 avos</option><option>Oitavas</option><option>Quartas</option><option>Semis</option><option>3º lugar</option><option>Final</option></select>{newM.ph==='Grupos'&&<select className="inp" style={inpSt} value={newM.gr} onChange={e=>setNewM(m=>({...m,gr:e.target.value}))}>{GROUPS.map(g=><option key={g}>{g}</option>)}</select>}<input className="inp" style={inpSt} type="datetime-local" value={newM.dt} onChange={e=>setNewM(m=>({...m,dt:e.target.value}))}/><input className="inp" style={inpSt} placeholder="Cidade/estádio" value={newM.venue} onChange={e=>setNewM(m=>({...m,venue:e.target.value}))}/></div>
            <button className="btn-acc" style={{...btnAcc,width:'100%'}} onClick={addMatch}>Adicionar partida</button>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div className="lux-card" style={{background:T.card,border:'1px solid '+T.border,borderRadius:18,padding:'18px',boxShadow:shadow}}>
            <SectionTitle title="Importar CSV" text="Colunas aceitas: id, home, away, dt, ph, gr, venue."/>
            <input className="inp" style={{...inpSt,marginBottom:8}} type="file" accept=".csv,text/csv" onChange={e=>{const file=e.target.files?.[0]; if(!file) return; const reader=new FileReader(); reader.onload=ev=>importMatchesFromCsvText(String(ev.target?.result||'')); reader.readAsText(file); e.target.value='';}}/>
            <button className="pill" style={{padding:'9px 12px',borderRadius:12,border:'1px solid '+T.border,background:T.bg,color:T.txt2,fontSize:11,fontWeight:900}} disabled>{csvImporting?'Importando...':'Importação segura por arquivo CSV'}</button>
          </div>
          <div className="lux-card" style={{background:T.card,border:'1px solid '+T.border,borderRadius:18,padding:'18px',boxShadow:shadow}}>
            <SectionTitle title="Auditoria recente" text="Últimas ações administrativas registradas."/>
            {audit.length?audit.slice(0,8).map((a,idx)=><div key={idx} style={{padding:'8px 0',borderTop:idx?'1px solid '+T.border:'none'}}><div style={{fontSize:12,fontWeight:900,color:T.txt1}}>{a.action||'ação'}</div><div style={{fontSize:10,color:T.txt3,marginTop:2}}>{a.byName||a.by||'admin'} · {a.at?new Date(a.at).toLocaleString('pt-BR'):'agora'}</div></div>):<div style={{fontSize:12,color:T.txt3}}>Nenhuma ação registrada ainda.</div>}
          </div>
          <div className="lux-card" style={{background:T.card,border:'1px solid '+T.border,borderRadius:18,padding:'18px',boxShadow:shadow}}>
            <SectionTitle title={'Participantes reais ('+parts.length+')'} text="Somente quem registrou nome aparece aqui."/>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>{parts.map(p=><div key={p} style={{display:'flex',alignItems:'center',gap:6,background:T.accentLt,border:'1px solid '+T.accentMd,borderRadius:999,padding:'6px 7px 6px 12px'}}><span style={{fontSize:12,fontWeight:900,color:T.accent}}>{getName(p)}</span>{p!==me&&<button onClick={()=>removeParticipant(p)} style={{width:20,height:20,borderRadius:'50%',border:'none',background:'rgba(220,38,38,.1)',color:T.err,cursor:'pointer',fontSize:12,fontWeight:900}}>×</button>}</div>)}</div>
          </div>
        </div>
      </div>
      <div style={{height:88}}/>
    </div>
  );
  // ── Shell ───────────────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:'100vh',background:'transparent',display:'flex',flexDirection:'column'}}>
      {/* Toast */}
      {toast.msg&&<div style={{position:'fixed',top:14,left:'50%',transform:'translateX(-50%)',background:toast.ok?T.ok:T.err,color:'#fff',padding:'9px 22px',borderRadius:24,fontSize:13,fontWeight:600,zIndex:1000,boxShadow:'0 4px 20px rgba(0,0,0,.15)',whiteSpace:'nowrap'}}>{toast.msg}</div>}

      {/* Top bar */}
      <div className="topbar-premium" style={{background:'rgba(255,255,255,.82)',backdropFilter:'blur(10px)',borderBottom:`1px solid ${T.border}`,padding:'12px 14px',position:'sticky',top:0,zIndex:50,boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
        <div style={{maxWidth:1120,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <span style={{fontSize:18,fontWeight:900,color:'#006B2B',letterSpacing:-.2}}>Nosso Bolão 2026</span>
          </div>
          <nav style={{display:'flex',alignItems:'center',gap:22,fontSize:14,position:'relative'}}>
            <button onClick={()=>{setTab('home');setShowPalpitesMenu(false);}} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:14,color:tab==='home'?'#009C3B':'#111827',fontWeight:tab==='home'?800:500}}>Início</button>
            <div style={{position:'relative'}}>
              <button onClick={()=>setShowPalpitesMenu(v=>!v)} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:14,color:tab==='matches'?'#009C3B':'#111827',fontWeight:tab==='matches'?800:500}}>Palpites {showPalpitesMenu?'⌃':'⌄'}</button>
              {showPalpitesMenu&&<div style={{position:'absolute',top:28,left:'50%',transform:'translateX(-50%)',width:210,background:'#fff',border:'1px solid '+T.border,borderRadius:10,boxShadow:'0 12px 28px rgba(15,23,42,.14)',padding:'10px 0',zIndex:200}}>
                <div style={{position:'absolute',top:-7,left:'50%',width:14,height:14,background:'#fff',borderLeft:'1px solid '+T.border,borderTop:'1px solid '+T.border,transform:'translateX(-50%) rotate(45deg)'}}/>
                <button onClick={()=>{setTab('matches');setMatchView('groups');setShowPalpitesMenu(false);}} style={{width:'100%',border:'none',background:'transparent',padding:'13px 18px',display:'flex',gap:12,alignItems:'center',fontSize:14,color:T.txt1,cursor:'pointer',textAlign:'left'}}>⚽ <span>Fase de Grupos</span></button>
                <button onClick={()=>{setTab('matches');setMatchView('knockout');setShowPalpitesMenu(false);}} style={{width:'100%',border:'none',background:'transparent',padding:'13px 18px',display:'flex',gap:12,alignItems:'center',fontSize:14,color:T.txt1,cursor:'pointer',textAlign:'left'}}>⚡ <span>Eliminatórias</span></button>
              </div>}
            </div>
            <button onClick={()=>{setTab('ranking');setShowPalpitesMenu(false);}} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:14,color:tab==='ranking'?'#009C3B':'#111827',fontWeight:tab==='ranking'?800:500}}>Ranking</button>
            <button onClick={()=>{setTab('rules');setShowPalpitesMenu(false);}} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:14,color:tab==='rules'?'#009C3B':'#111827',fontWeight:tab==='rules'?800:500}}>Regulamento</button>
            {isAdmin&&<button onClick={()=>{setTab('admin');setShowPalpitesMenu(false);}} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:14,color:tab==='admin'?'#009C3B':'#111827',fontWeight:tab==='admin'?800:500}}>Admin</button>}
          </nav>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:11,color:T.txt3,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{meName}</span>
            <button style={{padding:'6px 12px',borderRadius:20,border:`1px solid ${T.border}`,background:'rgba(255,255,255,.72)',color:T.txt2,fontSize:11,fontWeight:800,cursor:'pointer',boxShadow:'0 6px 16px rgba(15,23,42,.05)'}} onClick={copyLink}>🔗 Convidar</button>
            <button style={{padding:'5px 10px',borderRadius:12,border:`1px solid ${T.border}`,background:'rgba(255,255,255,.62)',color:T.txt3,fontSize:10,cursor:'pointer'}} onClick={logout}>Sair</button>
          </div>
        </div>
      </div>

      <div style={{background:'#00732E',color:'#fff',minHeight:36,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}}>
        <span style={{display:'inline-flex',alignItems:'center',gap:12}}>🏆 <strong>Bolão ativo</strong><span style={{width:4,height:4,borderRadius:'50%',background:'#22C55E'}}/> {parts.length} participante{parts.length!==1?'s':''}<span style={{width:4,height:4,borderRadius:'50%',background:'#22C55E'}}/> palpites protegidos até a bola rolar</span>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:'auto',maxWidth:1120,width:'100%',margin:'0 auto'}}>
        {tab==='home'&&renderTabHome()}
        {tab==='matches'&&renderTabMatches()}
        {tab==='ranking'&&renderTabRanking()}
        {tab==='rules'&&renderTabRules()}
        {tab==='admin'&&renderTabAdmin()}
      </div>

      {/* Bottom nav */}
      <div className="bottom-nav-premium" style={{position:'fixed',bottom:0,left:0,right:0,background:'rgba(255,255,255,.9)',backdropFilter:'blur(10px)',borderTop:`1px solid ${T.border}`,display:'flex',boxShadow:'0 -2px 12px rgba(0,0,0,.06)',zIndex:100}}>
        {[
          {k:'home',icon:'🏠',l:'Início'},
          {k:'matches',icon:'⚽',l:'Seus palpites'},
          {k:'ranking',icon:'🏆',l:'Ranking'},
          isAdmin ? {k:'admin',icon:'⚙️',l:'Admin'} : {k:'rules',icon:'📘',l:'Regras'},
        ].map(({k,icon,l})=>(
          <button key={k} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'10px 0 calc(10px + env(safe-area-inset-bottom))',background:'none',border:'none',cursor:'pointer',color:tab===k?T.accent:T.txt3,borderTop:`2px solid ${tab===k?T.accent:'transparent'}`}}
            onClick={()=>{
              if(k==='admin'&&!isAdmin){
                showToast('Sem permissão de admin para este usuário.',false);
              }else setTab(k);
            }}>
            <span style={{width:34,height:28,borderRadius:14,background:tab===k?T.accentLt:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:tab===k?20:18,boxShadow:tab===k?'0 6px 16px rgba(22,163,74,.16)':'none'}}>{icon}</span>
            <span style={{fontSize:10,fontWeight:tab===k?700:500}}>{l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Bolao/>);
</script>
</body>
</html>
