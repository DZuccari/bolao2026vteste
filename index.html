:root{
  --grass-700:#166534;
  --grass-600:#16a34a;
  --grass-100:#dcfce7;
  --gold-500:#ca8a04;
  --ink-900:#111827;
  --ink-500:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:
    radial-gradient(1100px 500px at -10% -10%, #ecfdf5 0%, rgba(236,253,245,0) 60%),
    radial-gradient(900px 460px at 110% -15%, #fef9c3 0%, rgba(254,249,195,0) 62%),
    linear-gradient(180deg,#f8fafc 0%,#f1f5f9 100%);
  font-family:"DM Sans",system-ui,-apple-system,sans-serif;
  color:var(--ink-900);
}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:999px;}
.inp:focus{border-color:var(--grass-600)!important;box-shadow:0 0 0 3px rgba(22,163,74,.12);outline:none;}
.score-inp:focus{border-color:var(--grass-600)!important;box-shadow:0 0 0 3px rgba(22,163,74,.14);outline:none;}
.btn-acc{transition:transform .12s ease,box-shadow .2s ease,filter .2s ease;}
.btn-acc:hover{filter:brightness(.98);box-shadow:0 6px 16px rgba(22,163,74,.22);}
.btn-acc:active{transform:translateY(1px);}
.pill{transition:all .18s;cursor:pointer;}
summary{list-style:none;}
summary::-webkit-details-marker{display:none;}
.match-card{
  border:1px solid rgba(17,24,39,.08)!important;
  animation:cardIn .32s ease both;
}
.match-card:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(17,24,39,.12)!important;}
select{cursor:pointer;}
.login-grid{grid-template-columns:minmax(0,1.05fr) minmax(320px,.95fr);}
.login-hero{min-height:480px;}
.login-score-grid,.info-grid{grid-template-columns:repeat(3,1fr);}
.join-grid{grid-template-columns:minmax(0,.9fr) minmax(300px,1fr);}
@keyframes cardIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
@media (max-width:820px){
  .login-grid,.join-grid{grid-template-columns:1fr!important;}
  .login-hero{min-height:auto!important;}
}
@media (max-width:620px){
  .login-score-grid,.info-grid{grid-template-columns:1fr!important;}
}
@media (max-width:480px){
  .match-card{animation:none;}
}
</style>

// ── Helpers ───────────────────────────────────────────────────────────────────
function calcPts(pred,result){
  if(!result||result.home===''||result.away==='') return null;
  const ph=+pred.home,pa=+pred.away,rh=+result.home,ra=+result.away;
  if(isNaN(ph)||isNaN(pa)) return null;
  if(ph===rh&&pa===ra) return 3;
  return (ph>pa?'H':ph<pa?'A':'D')===(rh>ra?'H':rh<ra?'A':'D')?1:0;
}
const fDate=dt=>new Date(dt).toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
const fTime=dt=>new Date(dt).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo'});
const dayKeySP=dt=>new Intl.DateTimeFormat('pt-BR',{timeZone:'America/Sao_Paulo',day:'2-digit',month:'2-digit',year:'numeric'}).format(new Date(dt));
const started=dt=>new Date(dt).getTime()<=Date.now();
const isToday=dt=>dayKeySP(dt)===dayKeySP(new Date());
const isUpcoming=dt=>{const h=(new Date(dt).getTime()-Date.now())/3600000;return h>0&&h<=24;};
const timeUntilShort=dt=>{
  const mins=Math.max(0,Math.round((new Date(dt).getTime()-Date.now())/60000));
  if(mins<60) return `${mins}min`;
  const hours=Math.round(mins/60);
  if(hours<48) return `${hours}h`;
  return `${Math.round(hours/24)}d`;
};
const normalizeName=value=>value.trim().replace(/\s+/g,' ');
const isValidName=name=>name.length>=2&&name.length<=24&&!/[.#$\[\]/]/.test(name);
const parseScore=value=>{
  const n=Number(value);
  if(!Number.isInteger(n)||n<0||n>20) return null;
  return n;
};
const parseCsvLine=(line,delimiter=',')=>{
  const out=[];
  let cur='';
  let inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){
      if(inQuotes&&line[i+1]==='"'){cur+='"';i++;}
      else inQuotes=!inQuotes;
      continue;
    }
    if(ch===delimiter&&!inQuotes){out.push(cur.trim());cur='';continue;}
    cur+=ch;
  }
  out.push(cur.trim());
  return out;
};

// ── Main App ──────────────────────────────────────────────────────────────────
function Bolao(){
  const [me,setMe]=useState(''); // auth uid
  const [meName,setMeName]=useState('');
  const [meEmail,setMeEmail]=useState('');
  const [authReady,setAuthReady]=useState(false);
  const [nameInput,setNameInput]=useState('');
  const [tab,setTab]=useState('home');
  const [matches,setMatches]=useState([]);
  const [preds,setPreds]=useState({});
  const [parts,setParts]=useState([]); // uid list
  const [partMeta,setPartMeta]=useState({}); // { uid: { name, email } }
  const [adminIds,setAdminIds]=useState({});
  const [audit,setAudit]=useState([]);
  const [champPreds,setChampPreds]=useState({});
  const [champWinner,setChampWinner]=useState('');
  const [pi,setPi]=useState({});        // local prediction inputs
  const [ri,setRi]=useState({});        // local result inputs (admin)
  const [champInput,setChampInput]=useState('');
  const [adminChampInput,setAdminChampInput]=useState('');
  const [onlyMissing,setOnlyMissing]=useState(false);
  const [reminderEnabled,setReminderEnabled]=useState(localStorage.getItem(REMINDER_STORAGE_KEY)==='1');
  const [lastReminderMatch,setLastReminderMatch]=useState('');
  const [csvImporting,setCsvImporting]=useState(false);
  const [saving,setSaving]=useState(null);
  const [toast,setToast]=useState({msg:'',ok:true});
  const [boot,setBoot]=useState(true);
  const [newM,setNewM]=useState({home:'',away:'',ph:'Grupos',gr:'A',dt:'',venue:''});
  const isAdmin = !!(me && adminIds[me]);
  const firstMatch = matches[0] || BASE_MATCHES[0] || null;
  const champLockDt = firstMatch?.dt || '';
  const champLocked = champLockDt ? started(champLockDt) : false;
  const champLockLabel = champLockDt ? `${fDate(champLockDt)} às ${fTime(champLockDt)}` : 'início do primeiro jogo';

  const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast({msg:'',ok:true}),2600);};
  const getName = uid => partMeta[uid]?.name || 'Sem nome';
  const meReady = !!me && !!partMeta[me]?.name;

  // ── Auth listener ───────────────────────────────────────────────────────────
  useEffect(()=>{
    const savedName = localStorage.getItem(NAME_STORAGE_KEY) || '';
    const authUnsub = auth.onAuthStateChanged(user=>{
      if(user){
        const fallbackName = normalizeName(savedName || user.displayName || (user.email?user.email.split('@')[0]:''));
        setMe(user.uid);
        setMeEmail(user.email || '');
        setNameInput(fallbackName.slice(0,24));
        setBoot(true);
      }else{
        setMe('');
        setMeName('');
        setMeEmail('');
        setMatches([]);
        setPreds({});
        setParts([]);
        setPartMeta({});
        setAdminIds({});
        setChampPreds({});
        setChampWinner('');
        setAudit([]);
        setBoot(false);
      }
      setAuthReady(true);
    });
    return ()=>{authUnsub && authUnsub();};
  },[]);

  // ── Database listeners (only after auth) ───────────────────────────────────
  useEffect(()=>{
    if(!authReady||!me) return;
    let live=true;
    setBoot(true);

    const onReadError=(err,path)=>{
      if(!live) return;
      console.error('Firebase read error:', path, err && (err.code||err.message||err));
      showToast('Erro de leitura no Firebase. Verifique login e regras.',false);
      setBoot(false);
    };

    ref('matches').once('value').then(snap=>{
      if(!snap.val()&&isAdmin){
        const obj={};
        BASE_MATCHES.forEach(m=>{obj[m.id]=m;});
        ref('matches').set(obj).catch(()=>{});
      }
    }).catch(err=>onReadError(err,'matches.once'));

    const matchesRef = ref('matches');
    const predsRef = ref('predictions');
    const partsRef = ref('participants');
    const adminsRef = ref('admins');
    const champRef = ref('champPreds');
    const champWinnerRef = ref('champWinner');
    const auditQuery = ref('audit').limitToLast(30);

    const matchesUnsub = matchesRef.on('value', snap=>{
      if(!live) return;
      const val=snap.val()||{};
      const arr=Object.values(val).sort((a,b)=>new Date(a.dt)-new Date(b.dt));
      setMatches(arr);
      const riInit={};
      arr.forEach(m=>{riInit[m.id]=m.result||{home:'',away:''};});
      setRi(riInit);
      setBoot(false);
    }, err=>onReadError(err,'matches.on'));

    const predsUnsub = predsRef.on('value', snap=>{
      if(!live) return;
      setPreds(snap.val()||{});
    }, err=>onReadError(err,'predictions.on'));

    const partsUnsub = partsRef.on('value', snap=>{
      if(!live) return;
      const val=snap.val()||{};
      const ids=Object.keys(val);
      const meta={};
      ids.forEach(uid=>{
        const item=val[uid];
        if(item&&typeof item==='object'){
          const parsedName=normalizeName((item.name||'').toString()).slice(0,24);
          meta[uid]={name:parsedName||'Sem nome',email:item.email||''};
        }else{
          const legacyName=normalizeName(uid);
          meta[uid]={name:legacyName||'Sem nome',email:''};
        }
      });
      setParts(ids);
      setPartMeta(meta);
    }, err=>onReadError(err,'participants.on'));

    const adminsUnsub = adminsRef.on('value', snap=>{
      if(!live) return;
      setAdminIds(snap.val()||{});
    }, err=>onReadError(err,'admins.on'));

    const auditUnsub = auditQuery.on('value', snap=>{
      if(!live) return;
      const val=snap.val()||{};
      const arr=Object.entries(val).map(([id,item])=>({id,...item})).sort((a,b)=>(b.ts||0)-(a.ts||0));
      setAudit(arr);
    }, err=>onReadError(err,'audit.on'));

    const champUnsub = champRef.on('value', snap=>{
      if(!live) return;
      setChampPreds(snap.val()||{});
    }, err=>onReadError(err,'champPreds.on'));

    const champWinUnsub = champWinnerRef.on('value', snap=>{
      if(!live) return;
      setChampWinner(snap.val()||'');
    }, err=>onReadError(err,'champWinner.on'));

    return ()=>{
      live=false;
      matchesRef.off('value', matchesUnsub);
      predsRef.off('value', predsUnsub);
      partsRef.off('value', partsUnsub);
      adminsRef.off('value', adminsUnsub);
      auditQuery.off('value', auditUnsub);
      champRef.off('value', champUnsub);
      champWinnerRef.off('value', champWinUnsub);
    };
  },[authReady, me, isAdmin]);

  // Populate local inputs when user or preds/matches change
  useEffect(()=>{
    if(!me||matches.length===0) return;
    const piInit={};
    matches.forEach(m=>{piInit[m.id]=(preds[me]||{})[m.id]||{home:'',away:''};});
    setPi(piInit);
    setChampInput(champPreds[me]||'');
  },[me, matches, preds[me], champPreds[me]]);

  useEffect(()=>{
    if(me) setChampInput(champPreds[me]||'');
  },[champPreds, me]);

  useEffect(()=>{
    if(me&&partMeta[me]?.name){
      setMeName(partMeta[me].name);
      if(!nameInput) setNameInput(partMeta[me].name);
    }
  },[me, partMeta]);

  useEffect(()=>{
    localStorage.setItem(REMINDER_STORAGE_KEY, reminderEnabled?'1':'0');
  },[reminderEnabled]);

  // ── Actions ─────────────────────────────────────────────────────────────────
  const join=async()=>{
    if(!me){showToast('Faça login com Google primeiro.',false);return;}
    const raw=normalizeName(nameInput);
    if(!isValidName(raw)){
      showToast('Nome inválido (2-24 chars, sem . # $ [ ] /)',false);
      return;
    }
    try{
      localStorage.setItem(NAME_STORAGE_KEY, raw);
      await ref('participants/'+me).update({
        name:raw,
        email:meEmail||'',
        updatedAt:firebase.database.ServerValue.TIMESTAMP,
      });
      const legacyId = parts.find(id=>id!==me&&getName(id).localeCompare(raw,'pt-BR',{sensitivity:'base'})===0);
      if(legacyId){
        if(!preds[me]&&preds[legacyId]) await ref('predictions/'+me).set(preds[legacyId]);
        if(!champPreds[me]&&champPreds[legacyId]) await ref('champPreds/'+me).set(champPreds[legacyId]);
      }
      setMeName(raw);
      setPartMeta(prev=>({...prev,[me]:{name:raw,email:meEmail||''}}));
      setParts(prev=>prev.includes(me)?prev:[...prev,me]);
      showToast('Perfil salvo!');
    }catch{
      showToast('Erro ao salvar perfil.',false);
    }
    const piInit={};
    matches.forEach(m=>{piInit[m.id]=(preds[me]||{})[m.id]||{home:'',away:''};});
    setPi(piInit);
    setChampInput(champPreds[me]||'');
  };

  const signInGoogle=async()=>{
    try{
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.addScope('profile');
      provider.addScope('email');
      await auth.signInWithPopup(provider);
    }catch{
      showToast('Falha no login Google. Verifique se o provedor está habilitado no Firebase Auth.',false);
    }
  };

  const claimFirstAdmin=async()=>{
    if(!me){showToast('Faça login primeiro.',false);return;}
    if(Object.keys(adminIds).length>0){showToast('Admins já foram definidos.',false);return;}
    try{
      await ref('admins/'+me).set(true);
      showToast('Você agora é admin deste bolão.');
    }catch{
      showToast('Erro ao definir admin.',false);
    }
  };

  const logAdminAction=(action,detail={})=>{
    if(!me) return Promise.resolve();
    return ref('audit').push({
      uid:me,
      name:meName||getName(me),
      action,
      detail,
      ts:firebase.database.ServerValue.TIMESTAMP,
    }).catch(()=>{});
  };

  const logout=async()=>{
    localStorage.removeItem(NAME_STORAGE_KEY);
    try{
      await auth.signOut();
    }catch{
      showToast('Erro ao sair.',false);
    }
    setMe(''); setNameInput(''); setMeName(''); setMeEmail('');
  };

  const savePred=async(id)=>{
    const m=matches.find(x=>x.id===id);
    if(!m||started(m.dt)){showToast('Palpite bloqueado para este jogo.',false);return;}
    const p=pi[id]||{home:'',away:''};
    const home=parseScore(p.home),away=parseScore(p.away);
    if(home===null||away===null){showToast('Placar inválido (0 a 20).',false);return;}
    setSaving(id);
    try{
      await ref(`predictions/${me}/${id}`).set({home,away});
      showToast('Palpite salvo!');
    }catch{
      showToast('Erro ao salvar palpite.',false);
    }finally{
      setSaving(null);
    }
  };

  const saveChamp=async()=>{
    if(champLocked){showToast('Palpite de campeão bloqueado após o início da Copa.',false);return;}
    if(!champInput) return;
    try{
      await ref('champPreds/'+me).set(champInput);
      showToast(`Campeão salvo: ${champInput}!`);
    }catch{
      showToast('Erro ao salvar campeão.',false);
    }
  };
  const saveResult=async(id)=>{
    if(!isAdmin){showToast('Ação permitida só para admin.',false);return;}
    const res=ri[id]||{home:'',away:''};
    const home=parseScore(res.home),away=parseScore(res.away);
    if(home===null||away===null){showToast('Resultado inválido (0 a 20).',false);return;}
    try{
      await ref('matches/'+id+'/result').set({home,away});
      await logAdminAction('save_result',{matchId:id,home,away});
      showToast('Resultado salvo!');
    }catch{
      showToast('Erro ao salvar resultado.',false);
    }
  };
  const saveChampWinner=async()=>{
    if(!isAdmin){showToast('Ação permitida só para admin.',false);return;}
    if(!adminChampInput){showToast('Selecione o campeão oficial.',false);return;}
    try{
      await ref('champWinner').set(adminChampInput);
      await logAdminAction('set_champion',{team:adminChampInput});
      showToast('Campeão oficial definido!');
    }catch{
      showToast('Erro ao salvar campeão oficial.',false);
    }
  };
  const removeParticipant=async(uid)=>{
    if(!isAdmin){showToast('Ação permitida só para admin.',false);return;}
    if(uid===me){showToast('Não remova seu próprio usuário por aqui.',false);return;}
    const label=getName(uid);
    if(!confirm(`Remover "${label}" do bolão? Todos os palpites dele serão apagados.`)) return;
    try{
      await ref('participants/'+uid).remove();
      await ref('predictions/'+uid).remove();
      await ref('champPreds/'+uid).remove();
      await logAdminAction('remove_participant',{uid,name:label});
      showToast(`${label} removido.`);
    }catch{
      showToast('Erro ao remover participante.',false);
    }
  };
  const addMatch=async()=>{
    if(!isAdmin){showToast('Ação permitida só para admin.',false);return;}
    if(!newM.home||!newM.away||!newM.dt) return;
    const dtObj=new Date(newM.dt);
    if(Number.isNaN(dtObj.getTime())){showToast('Data inválida.',false);return;}
    const dtISO=dtObj.toISOString();
    const id='cx_'+Date.now();
    const m={...newM,id,dt:dtISO,home:newM.home.trim(),away:newM.away.trim(),venue:newM.venue.trim()};
    try{
      await ref('matches/'+id).set(m);
      await logAdminAction('add_match',{id,home:m.home,away:m.away,dt:m.dt});
      setNewM({home:'',away:'',ph:'Grupos',gr:'A',dt:'',venue:''});
      showToast('Partida adicionada!');
    }catch{
      showToast('Erro ao adicionar partida.',false);
    }
  };
  const copyLink=()=>{
    navigator.clipboard.writeText(window.location.href)
      .then(()=>showToast('Link copiado! 🔗'))
      .catch(()=>showToast('Copie a URL do navegador',false));
  };

  const requestReminderPermission=async()=>{
    if(!('Notification' in window)){showToast('Seu navegador não suporta notificações.',false);return;}
    try{
      const permission = await Notification.requestPermission();
      if(permission==='granted'){setReminderEnabled(true);showToast('Lembretes ativados!');}
      else showToast('Permissão de notificação não concedida.',false);
    }catch{
      showToast('Não foi possível pedir permissão.',false);
    }
  };

  const importMatchesFromCsvText=async(text)=>{
    if(!isAdmin){showToast('Ação permitida só para admin.',false);return;}
    const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    if(lines.length<2){showToast('CSV vazio ou incompleto.',false);return;}
    const delimiter=lines[0].includes(';')?';':',';
    const header=parseCsvLine(lines[0],delimiter).map(h=>h.toLowerCase());
    const idx=(...keys)=>header.findIndex(h=>keys.includes(h));
    const iId=idx('id');
    const iHome=idx('home','casa','time_casa');
    const iAway=idx('away','fora','time_fora');
    const iDt=idx('dt','data','datetime','datahora');
    const iPh=idx('ph','fase');
    const iGr=idx('gr','grupo');
    const iVenue=idx('venue','sede','estadio');
    if(iHome<0||iAway<0||iDt<0){
      showToast('CSV precisa das colunas: home, away, dt.',false);
      return;
    }
    const updates={};
    let okCount=0;
    lines.slice(1).forEach((line,rowIx)=>{
      const cols=parseCsvLine(line,delimiter);
      const home=(cols[iHome]||'').trim();
      const away=(cols[iAway]||'').trim();
      const dtRaw=(cols[iDt]||'').trim();
      if(!home||!away||!dtRaw) return;
      const dtObj=new Date(dtRaw.includes('T')?dtRaw:dtRaw.replace(' ','T'));
      if(Number.isNaN(dtObj.getTime())) return;
      const ph=(cols[iPh]||'Grupos').trim()||'Grupos';
      const id=((cols[iId]||'').trim()) || `csv_${Date.now()}_${rowIx}`;
      const gr=ph==='Grupos'?((cols[iGr]||'A').trim()||'A'):'';
      const venue=(cols[iVenue]||'').trim();
      updates[id]={id,home,away,dt:dtObj.toISOString(),ph,gr,venue};
      okCount++;
    });
    if(okCount===0){showToast('Nenhuma linha válida no CSV.',false);return;}
    setCsvImporting(true);
    try{
      await ref('matches').update(updates);
      await logAdminAction('import_csv',{count:okCount});
      showToast(`${okCount} partidas importadas via CSV.`);
    }catch{
      showToast('Erro ao importar CSV.',false);
    }finally{
      setCsvImporting(false);
    }
  };

  const onCsvFile=async(e)=>{
    const file=e.target.files?.[0];
    if(!file) return;
    try{
      const text=await file.text();
      await importMatchesFromCsvText(text);
    }catch{
      showToast('Falha ao ler arquivo CSV.',false);
    }finally{
      e.target.value='';
    }
  };

  // ── Computed ────────────────────────────────────────────────────────────────
  const scoredMatches=matches.filter(m=>m.result&&m.result.home!==''&&m.result.home!==undefined);
  const scoreBoardForMatches=(scopeMatches,{includeChampion=false}={})=>[...parts].map(uid=>{
    const name=getName(uid);
    let pts=0,exact=0,win=0,miss=0,total=0;
    scopeMatches.forEach(m=>{
      const p=(preds[uid]||{})[m.id]; if(!p) return;
      const x=calcPts(p,m.result); if(x===null) return;
      total++;pts+=x;if(x===3)exact++;else if(x===1)win++;else miss++;
    });
    const champHit = includeChampion&&champWinner&&champPreds[uid]===champWinner;
    if(champHit) pts+=CHAMP_PTS;
    return {uid,name,pts,exact,win,miss,total,champHit:champHit?1:0};
  }).sort((a,b)=>
    b.pts-a.pts ||
    b.exact-a.exact ||
    b.win-a.win ||
    b.champHit-a.champHit ||
    a.miss-b.miss ||
    a.name.localeCompare(b.name,'pt-BR')
  );
  const board=scoreBoardForMatches(matches,{includeChampion:true});
  const myPredMap=preds[me]||{};
  const savedPredCount=matches.filter(m=>myPredMap[m.id]&&myPredMap[m.id].home!=='').length;
  const lockedMatchCount=matches.filter(m=>started(m.dt)).length;
  const resultMatchCount=scoredMatches.length;
  const progressPct=matches.length?Math.round(savedPredCount/matches.length*100):0;
  const pendingMatches=matches
    .filter(m=>!started(m.dt)&&(!myPredMap[m.id]||myPredMap[m.id].home===''))
    .sort((a,b)=>new Date(a.dt)-new Date(b.dt));
  const urgentPendingAll=pendingMatches.filter(m=>new Date(m.dt).getTime()-Date.now()<=48*3600000);
  const urgentPending=urgentPendingAll.slice(0,4);
  const nextMatches=matches.filter(m=>!started(m.dt)).sort((a,b)=>new Date(a.dt)-new Date(b.dt)).slice(0,4);
  const champDone=!!champPreds[me];
  const actionCount=urgentPendingAll.length+(!champDone&&!champLocked?1:0);

  const myStats=(()=>{
    let pts=0,exact=0,win=0,miss=0,total=0;
    matches.forEach(m=>{
      const p=(preds[me]||{})[m.id]; if(!p) return;
      const x=calcPts(p,m.result); if(x===null) return;
      total++;pts+=x;if(x===3)exact++;else if(x===1)win++;else miss++;
    });
    if(champWinner&&champPreds[me]===champWinner) pts+=CHAMP_PTS;
    const rank=board.findIndex(p=>p.uid===me)+1;
    const missing=pendingMatches.length;
    return {pts,exact,win,miss,total,rank:rank||null,pct:total>0?Math.round((exact+win)/total*100):0,missing};
  })();

  useEffect(()=>{
    if(!reminderEnabled||!meReady) return;
    if(!('Notification' in window)||Notification.permission!=='granted') return;
    const tick=()=>{
      const pending = matches
        .filter(m=>!started(m.dt)&&(!(preds[me]||{})[m.id]||(preds[me]||{})[m.id].home===''))
        .sort((a,b)=>new Date(a.dt)-new Date(b.dt));
      const next = pending[0];
      if(!next) return;
      const mins=Math.round((new Date(next.dt).getTime()-Date.now())/60000);
      if(mins>0&&mins<=90&&lastReminderMatch!==next.id){
        new Notification('Bolão Copa 2026', {body:`${getName(me)}, faltam ${mins} min para ${next.home} x ${next.away}.`});
        setLastReminderMatch(next.id);
      }
      if(mins>90&&lastReminderMatch===next.id){
        setLastReminderMatch('');
      }
    };
    tick();
    const timer=setInterval(tick,60000);
    return ()=>clearInterval(timer);
  },[reminderEnabled,meReady,matches,preds,me,lastReminderMatch]);

  const predictionMatches=onlyMissing
    ? matches.filter(m=>!started(m.dt)&&(!(preds[me]||{})[m.id]||(preds[me]||{})[m.id].home===''))
    : matches;
  const groupByDay=list=>{
    const groups=[];
    const index={};
    list.forEach(m=>{
      const key=dayKeySP(m.dt);
      if(!index[key]){
        index[key]={
          key,
          label:new Date(m.dt).toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',timeZone:'America/Sao_Paulo'}),
          matches:[],
        };
        groups.push(index[key]);
      }
      index[key].matches.push(m);
    });
    return groups;
  };
  const predictionDayGroups=groupByDay(predictionMatches);
  const generalDayGroups=groupByDay(matches);
  const dailyBoards=groupByDay(scoredMatches).map(group=>({
    ...group,
    board:scoreBoardForMatches(group.matches).filter(p=>p.total>0||p.pts>0),
  })).filter(group=>group.board.length>0);
  const champPredCount=parts.filter(p=>champPreds[p]).length;

  // ── Match Card ──────────────────────────────────────────────────────────────
  const MatchCard=({m})=>{
    const st=started(m.dt);
    const hasR=m.result&&m.result.home!=='';
    const myS=(preds[me]||{})[m.id];
    const pts=myS?calcPts(myS,m.result):null;
    const inp=pi[m.id]||{home:'',away:''};
    const hasPred=myS&&myS.home!=='';
    const ptBg=pts===3?T.okBg:pts===1?T.halfBg:pts===0?T.errBg:null;
    const ptCol=pts===3?T.ok:pts===1?T.half:pts===0?T.err:null;
    const ptLabel=pts===3?'⭐ Exato':pts===1?'✓ Vencedor':pts===0?'✗ Errou':null;
    const dirty=String(inp.home??'')!==String(myS?.home??'')||String(inp.away??'')!==String(myS?.away??'');
    const statusColor=hasR?T.gold:st?'#1D4ED8':hasPred?T.accent:T.half;
    const statusBg=hasR?T.goldBg:st?'#DBEAFE':hasPred?T.accentLt:T.halfBg;

    return (

        <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 14px',borderBottom:`1px solid ${T.border}`,background:hasPred&&!st?T.accentLt:T.bg}}>

          {ptLabel&&<span style={{fontSize:10,fontWeight:700,color:ptCol,background:ptBg,padding:'2px 9px',borderRadius:20}}>{ptLabel}</span>}
          {hasR&&!ptLabel&&pts===null&&<span style={{fontSize:10,color:T.txt3,background:T.bg,padding:'2px 8px',borderRadius:20,border:`1px solid ${T.border}`}}>sem palpite</span>}
        </div>
        <div style={{display:'flex',alignItems:'center',padding:'16px 14px 12px'}}>
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'flex-start',gap:4}}>

          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:'0 8px',minWidth:130}}>
            {hasR&&(
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{fontSize:24,fontWeight:900,color:T.gold,background:T.goldBg,width:40,height:40,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}>{m.result.home}</div>
                <span style={{color:T.borderMd,fontWeight:700}}>–</span>
                <div style={{fontSize:24,fontWeight:900,color:T.gold,background:T.goldBg,width:40,height:40,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}>{m.result.away}</div>
              </div>
            )}
            {!st?(
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <input className="score-inp" type="number" min="0" max="20" placeholder="–" style={scoreInpSt} value={inp.home} onChange={e=>setPi(p=>({...p,[m.id]:{...p[m.id],home:e.target.value}}))}/>

                <input className="score-inp" type="number" min="0" max="20" placeholder="–" style={scoreInpSt} value={inp.away} onChange={e=>setPi(p=>({...p,[m.id]:{...p[m.id],away:e.target.value}}))}/>

        </div>

          </div>
        )}
      </div>
    );
  };

  // ── Loading ─────────────────────────────────────────────────────────────────
  if(boot) return (

  if(!authReady) return (

              ⚽ Copa do Mundo 2026

            <div style={{fontFamily:'\"Bebas Neue\", sans-serif',fontSize:72,fontWeight:400,color:'#fff',letterSpacing:3,lineHeight:.9}}>BOLÃO<br/>ENTRE AMIGOS</div>

                <div style={{fontSize:10,color:'rgba(255,255,255,.7)',fontWeight:800,textTransform:'uppercase',letterSpacing:.7,marginTop:5}}>{x.l}</div>

          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:22,padding:'22px',boxShadow:shadowMd}}>
            <div style={{fontSize:18,fontWeight:900,color:T.txt1,marginBottom:6}}>Entre no bolão</div>
            <p style={{fontSize:13,color:T.txt2,lineHeight:1.6,marginBottom:16}}>Use sua conta Google para registrar seu nome e salvar seus palpites com segurança.</p>
            <button className="btn-acc" style={{...btnAcc,width:'100%',padding:14,fontSize:15}} onClick={signInGoogle}>Entrar com Google</button>
            <div style={{fontSize:11,color:T.txt3,textAlign:'center',marginTop:12}}>Seu palpite de campeão trava no início do primeiro jogo.</div>
          </div>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:22,padding:'18px',boxShadow:shadow}}>
            <div style={{fontSize:13,fontWeight:900,color:T.txt1,marginBottom:12}}>Como funciona</div>

          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:22,padding:'18px',boxShadow:shadow}}>
            <div style={{fontSize:13,fontWeight:900,color:T.txt1,marginBottom:12}}>O que você acompanha</div>
            <div className="info-grid" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {[
                ['📌','Pendências','o que falta preencher'],

              ].map(item=>(
                <div key={item[1]} style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:14,padding:'10px 8px',textAlign:'center'}}>
                  <div style={{fontSize:18,marginBottom:4}}>{item[0]}</div>

          <div style={{background:T.goldBg,border:'1px solid #FCD34D',borderRadius:18,padding:'14px 16px',fontSize:12,color:'#92400E',lineHeight:1.55}}>
            <strong>Jogo limpo:</strong> palpites dos outros ficam ocultos até o jogo começar. O campeão também fica oculto até o início da Copa.
          </div>
        </div>
      </div>

  );

    <div style={{minHeight:'100vh',background:T.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div className="join-grid" style={{width:'100%',maxWidth:760,display:'grid',gridTemplateColumns:'minmax(0,.9fr) minmax(300px,1fr)',gap:14}}>
        <div style={{background:'linear-gradient(135deg,#166534,#16a34a)',borderRadius:22,padding:24,color:'#fff',boxShadow:shadowMd,position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',right:-40,top:-50,width:150,height:150,borderRadius:'50%',background:'rgba(255,255,255,.09)'}}/>
          <div style={{fontSize:12,fontWeight:900,letterSpacing:1,textTransform:'uppercase',color:'rgba(255,255,255,.72)',marginBottom:10}}>Quase lá</div>
          <div style={{fontFamily:'\"Bebas Neue\", sans-serif',fontSize:44,letterSpacing:1.5,lineHeight:1}}>Crie sua identidade no bolão</div>
          <p style={{fontSize:13,lineHeight:1.65,color:'rgba(255,255,255,.78)',marginTop:12}}>

          </p>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:18}}>
            {['Palpites ficam salvos na sua conta Google.','Cada jogo trava no horário de início.','Campeão trava quando a Copa começar.'].map(txt=>(
              <div key={txt} style={{display:'flex',gap:8,alignItems:'center',fontSize:12,color:'rgba(255,255,255,.82)'}}>
                <span style={{width:20,height:20,borderRadius:8,background:'rgba(255,255,255,.16)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11}}>✓</span>

        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:22,padding:24,boxShadow:shadowMd}}>
          <h2 style={{fontSize:18,color:T.txt1,marginBottom:8}}>Defina seu nome no bolão</h2>
          <p style={{fontSize:13,color:T.txt2,lineHeight:1.6,marginBottom:14}}>Use um nome que seus amigos reconheçam. Ele será exibido só para quem entrou no bolão.</p>

  // ── Home Tab ────────────────────────────────────────────────────────────────
  const TabHome=(
    <div style={{padding:'16px 14px 0'}}>
      {/* Hero */}
      <div style={{background:'linear-gradient(135deg,#166534 0%,#16a34a 55%,#65a30d 100%)',borderRadius:18,padding:'20px 20px 16px',marginBottom:14,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-30,right:-30,width:120,height:120,borderRadius:'50%',background:'rgba(255,255,255,.07)',pointerEvents:'none'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>

    <div style={{minHeight:'100vh',background:'transparent',display:'flex',flexDirection:'column'}}>
      {/* Toast */}
      {toast.msg&&<div style={{position:'fixed',top:14,left:'50%',transform:'translateX(-50%)',background:toast.ok?T.ok:T.err,color:'#fff',padding:'9px 22px',borderRadius:24,fontSize:13,fontWeight:600,zIndex:1000,boxShadow:'0 4px 20px rgba(0,0,0,.15)',whiteSpace:'nowrap'}}>{toast.msg}</div>}

      {/* Top bar */}
      <div style={{background:'rgba(255,255,255,.82)',backdropFilter:'blur(10px)',borderBottom:`1px solid ${T.border}`,padding:'12px 14px',position:'sticky',top:0,zIndex:50,boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
        <div style={{maxWidth:980,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:18}}>⚽</span>
            <span style={{fontFamily:'\"Bebas Neue\", sans-serif',fontSize:21,fontWeight:400,color:T.accent,letterSpacing:1.8}}>BOLÃO 2026</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:11,color:T.txt3,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{meName}</span>
            <button style={{padding:'5px 12px',borderRadius:20,border:`1px solid ${T.border}`,background:T.card,color:T.txt2,fontSize:11,fontWeight:600,cursor:'pointer'}} onClick={copyLink}>🔗 Convidar</button>
            <button style={{padding:'4px 10px',borderRadius:10,border:`1px solid ${T.border}`,background:T.card,color:T.txt3,fontSize:10,cursor:'pointer'}} onClick={logout}>Sair</button>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:'auto',maxWidth:980,width:'100%',margin:'0 auto'}}>
        {tab==='home'&&TabHome}
        {tab==='matches'&&TabMatches}
        {tab==='general'&&TabGeneralPreds}
        {tab==='ranking'&&TabRanking}
        {tab==='rules'&&TabRules}
        {tab==='admin'&&TabAdmin}
      </div>

      {/* Bottom nav */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'rgba(255,255,255,.9)',backdropFilter:'blur(10px)',borderTop:`1px solid ${T.border}`,display:'flex',boxShadow:'0 -2px 12px rgba(0,0,0,.06)',zIndex:100}}>
        {[
          {k:'home',icon:'🏠',l:'Início'},
          {k:'matches',icon:'⚽',l:'Seus palpites'},
          {k:'general',icon:'📋',l:'Gerais'},
          {k:'ranking',icon:'🏆',l:'Ranking'},
          isAdmin ? {k:'admin',icon:'⚙️',l:'Admin'} : {k:'rules',icon:'📘',l:'Regras'},
        ].map(({k,icon,l})=>(
          <button key={k} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'10px 0 calc(10px + env(safe-area-inset-bottom))',background:'none',border:'none',cursor:'pointer',color:tab===k?T.accent:T.txt3,borderTop:`2px solid ${tab===k?T.accent:'transparent'}`}}
            onClick={()=>{
              if(k==='admin'&&!isAdmin){
                showToast('Sem permissão de admin para este usuário.',false);
              }else setTab(k);
            }}>
            <span style={{fontSize:tab===k?20:18}}>{icon}</span>
            <span style={{fontSize:10,fontWeight:tab===k?700:500}}>{l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Bolao/>);
</script>
</body>
</html>
